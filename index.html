<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KT Infra IT Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KT Infra IT Solutions - Professional infrastructure services.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      background: #021a32;
      overflow: hidden;
      display: grid;
      place-items: center;
      position: relative;
      color: #ffffff;
    }
    .background {
      position: absolute;
      inset: 0;
      background: linear-gradient(140deg, rgba(6, 40, 77, 0.85), rgba(10, 24, 44, 0.9));
      z-index: 0;
    }
    .wave {
      position: absolute;
      inset: -10% 0 65% 0;
      background: radial-gradient(circle at 70% 15%, rgba(70, 148, 205, 0.25), transparent 50%),
                  radial-gradient(circle at 20% 30%, rgba(97, 183, 231, 0.22), transparent 48%);
      animation: floatWave 12s ease-in-out infinite;
      z-index: 1;
      filter: blur(18px);
    }
    .wave2 {
      position: absolute;
      inset: 20% -15% -5% -15%;
      background: radial-gradient(circle at 30% 20%, rgba(18, 116, 220, 0.18), transparent 45%),
                  radial-gradient(circle at 80% 70%, rgba(66, 168, 235, 0.16), transparent 46%);
      animation: floatWave 16s ease-in-out infinite reverse;
      z-index: 1;
      filter: blur(14px);
    }
    @keyframes floatWave {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.07); }
      100% { transform: translateY(0) scale(1); }
    }
    .spark {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(189, 236, 255, 0.85);
      box-shadow: 0 0 10px rgba(189, 236, 255, 0.7), 0 0 20px rgba(92, 180, 245, 0.5);
      animation: sparkMove 10s linear infinite;
      opacity: 0;
    }
    .spark:nth-child(1) { top: 25%; left: 20%; animation-delay: 0s; }
    .spark:nth-child(2) { top: 45%; left: 65%; animation-delay: 1.6s; }
    .spark:nth-child(3) { top: 68%; left: 30%; animation-delay: 3.1s; }
    .spark:nth-child(4) { top: 18%; left: 80%; animation-delay: 2.2s; }
    .spark:nth-child(5) { top: 55%; left: 15%; animation-delay: 4s; }
    .spark:nth-child(6) { top: 70%; left: 75%; animation-delay: 6.3s; }
    @keyframes sparkMove {
      0% { transform: translate(-15px, 0) scale(0.8); opacity: 0.2; }
      40% { opacity: 1; }
      100% { transform: translate(15px, -90px) scale(0.4); opacity: 0; }
    }
    .main {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 28px 32px;
      border-radius: 16px;
      background: rgba(5, 20, 38, 0.7);
      border: 1px solid rgba(110, 198, 237, 0.35);
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.45);
    }
    .main h1 {
      font-size: clamp(2.5rem, 6vw, 5rem);
      margin: 0;
      letter-spacing: 0.08em;
      font-weight: 800;
      color: #e4f5ff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.35);
      background: none;
      -webkit-background-clip: unset;
      -webkit-text-fill-color: unset;
    }
    .main p {
      margin-top: 12px;
      color: rgba(197, 226, 244, 0.9);
      font-size: 1.05rem;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="wave"></div>
  <div class="wave2"></div>
  <div class="spark"></div>
  <div class="spark"></div>
  <div class="spark"></div>
  <div class="spark"></div>
  <div class="spark"></div>
  <div class="spark"></div>
  <div class="main">
    <h1 id="brandName">KT Infra IT Solutions</h1>
    <p>Professional IT infrastructure with reliable business animation</p>
  </div>

  <script>
    const brand = document.getElementById('brandName');
    const chars = brand.textContent.split('');
    brand.textContent = '';
    const COLORS = ['#39C2FF', '#84E5FF', '#5BC9FF', '#B2FFFF', '#578FDD', '#33A8FF', '#92D2FF', '#71C1FF', '#A8F1FF'];
    chars.forEach((c, idx) => {
      const span = document.createElement('span');
      span.textContent = c;
      span.style.display = 'inline-block';
      span.style.transition = 'color 0.2s ease, transform 0.2s ease, text-shadow 0.3s ease, box-shadow 0.3s ease';
      span.style.padding = '0 1px';
      span.style.borderRadius = '4px';
      span.addEventListener('mouseenter', () => {
        const color = COLORS[idx % COLORS.length];
        span.style.color = color;
        span.style.transform = 'scale(1.2)';
      });
      span.addEventListener('mouseleave', () => {
        span.style.color = '#e4f5ff';
        span.style.transform = 'scale(1)';
      });
      brand.appendChild(span);
    });

    const background = document.querySelector('.background');
    const wave = document.querySelector('.wave');
    const wave2 = document.querySelector('.wave2');

    document.body.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 20;
      const y = (e.clientY / window.innerHeight - 0.5) * 20;
      background.style.transform = `translate(${x}px, ${y}px)`;
      wave.style.transform = `translate(${x * -0.5}px, ${y * -0.5}px)`;
      wave2.style.transform = `translate(${x * 0.5}px, ${y * 0.5}px)`;
    });

    document.body.addEventListener('mouseleave', () => {
      background.style.transform = 'translate(0,0)';
      wave.style.transform = 'translate(0,0)';
      wave2.style.transform = 'translate(0,0)';
    });
  </script>
</body>
</html>
