<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KT Infra IT Solutions | Launching April 2, 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KT Infra Solutions launching on April 2, 2026">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont;
    }

    body {
      height: 100vh;
      background: #ffffff;
      color: #333333;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      max-width: 650px;
      padding: 40px;
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 10px;
      color: #007bff;
    }

    p {
      font-size: 1.1rem;
      margin-bottom: 40px;
      color: #666666;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .time-box {
      background: rgba(0, 123, 255, 0.1);
      padding: 20px 25px;
      border-radius: 14px;
      min-width: 110px;
    }

    .time-box h2 {
      font-size: 2.4rem;
      color: #007bff;
    }

    .time-box span {
      font-size: 0.8rem;
      color: #666666;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    footer {
      margin-top: 40px;
      font-size: 0.9rem;
      color: #999999;
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🚀 Website Launch Countdown</h1>
    <p>
      <strong>KT Infra ITs Solutions</strong> (<strong>ktinfrasolutions.com</strong>) goes live on<br>
      <strong>April 2, 2026 – 12:00 AM</strong>
    </p>

    <div class="countdown">
      <div class="time-box">
        <h2 id="days">00</h2>
        <span>Days</span>
      </div>
      <div class="time-box">
        <h2 id="hours">00</h2>
        <span>Hours</span>
      </div>
      <div class="time-box">
        <h2 id="minutes">00</h2>
        <span>Minutes</span>
      </div>
      <div class="time-box">
        <h2 id="seconds">00</h2>
        <span>Seconds</span>
      </div>
    </div>

    <footer>
      © 2026 <strong>KT Infra IT Solutions</strong> - <strong>ktinfrasolutions.com</strong>
    </footer>
  </div>

  <script>
    /*
      Launch Date:
      April 2, 2026 at 12:00 AM (Midnight)
      Uses visitor's local time automatically
    */
    const launchDate = new Date("2026-04-02T00:00:00").getTime();

    const timer = setInterval(() => {
      const now = new Date().getTime();
      const distance = launchDate - now;

      if (distance <= 0) {
        clearInterval(timer);
        document.querySelector(".container").innerHTML = `
          <h1>🎉 We Are Live!</h1>
          <p>Welcome to <strong>KT Infra Solutions</strong> (<strong>ktinfrasolutions.com</strong>)</p>
        `;
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);

      document.getElementById("days").textContent = days;
      document.getElementById("hours").textContent = String(hours).padStart(2, "0");
      document.getElementById("minutes").textContent = String(minutes).padStart(2, "0");
      document.getElementById("seconds").textContent = String(seconds).padStart(2, "0");
    }, 1000);
  </script>

</body>
</html>
